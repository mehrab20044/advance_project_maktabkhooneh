<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    {% for todo in todos %}
    <h1>{{todo.title}}</h1>
    <h2>{{todo.text}}</h2>
    <h4>{{todo.complete}}</h4>
    <small>{{todo.created_date}}-------{{todo.author.first_name}}</small><br><br>
    <a href="{% url 'todo:edit' pk=todo.id %}">Edit</a>
    {% endfor %}
</body>

</html>
